<html>

<head>

  <title>DHSI</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Source for your Leaflet JavaScript and CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- Make sure you put this AFTER Leaflet's CSS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!--Add links to Leaflet MarkerCluster here-->

  <!--marker cluster libraries-->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css">
  <script src='https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster-src.js'></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />


  <!--Add scripts that link to data sources here-->
<script src="./public-art.js" charset="utf-8"></script>

<script src="./heritage-conservation-districts.js" charset="utf-8"></script>



</head>

<body>
  <!-- Your map's HTML container -->
  <div id="mapid" style="height: 100%;"></div>


  <script>

    // Initialize your map
    var mymap = L.map('mapid').setView( [43.66, -79.38], 12);


    //Load your tile layer
    var Stadia_StamenWatercolor = L.tileLayer('https://tiles.stadiamaps.com/tiles/stamen_watercolor/{z}/{x}/{y}.{ext}', {
	minZoom: 1,
	maxZoom: 16,
	attribution: '&copy; <a href="https://www.stadiamaps.com/" target="_blank">Stadia Maps</a> &copy; <a href="https://www.stamen.com/" target="_blank">Stamen Design</a> &copy; <a href="https://openmaptiles.org/" target="_blank">OpenMapTiles</a> &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
	ext: 'jpg'
}).addTo(mymap);


    // Add marker(s) here
var university = L.marker([43.66522362223668, -79.39567167921362]).addTo(mymap).bindPopup("University of Toronto");


    // Add point layer here
 //  L.geoJson(art, {onEachFeature: function(feature, layer){
            //layer.bindPopup(
               // "<b>" + feature.properties.Title + "</b><br>" +
                //feature.properties.Artist + "<br>" +
                //feature.properties.Description + "<br>" +
                //"<img src='" + feature.properties.ImageURL + "' width='200px'/>"
                //);
      //  }
    //}).addTo(mymap);
//  add art layer as cluster group 
    var markers = L.markerClusterGroup();

    L.geoJSON(art, {
      onEachFeature: function (feature, layer) {
        var popupContent =
          "<img src='" + feature.properties.ImageURL + 
          "' width='200px'/><br><b>Title: </b>" + 
          feature.properties.Title + 
          "<br><b>Artist: </b>" + 
          feature.properties.Artist
        layer.bindPopup(popupContent);
      },
    }).addTo(markers);
    markers.addTo(mymap);


    
    // Add polygon layer here
 L.geoJson(heritage, {onEachFeature, style: style}).addTo(mymap);

      function onEachFeature(feature, heritage) {
          { if (feature.properties && feature.properties.HCD_NAME) { heritage.bindPopup(feature.properties.HCD_NAME); } }
        }

     function style(feature, heritage) {
      return {
        fillColor: '#5E3A85',
        color: '#EBE1F0',
        weight: .5,
        fillOpacity: 0.8
      };
    }



  </script>


</body>

</html>
